<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jayesh Choudhari - AI Researcher</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --muted2:#8b97b3;
  --border2:rgba(255,255,255,0.06);
  --bg:#050810;
  --bg2:#07091A;
  --surface:#0d1221;
  --surface2:#111830;
  --border:rgba(255,255,255,0.08);
  --accent:#4af0ff;
  --text:#f0f4ff;
  --muted:#6b7a9a;
  --font-head:'Plus Jakarta Sans',sans-serif;
  --font-body:'Inter',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.6;
  overflow-x:hidden;
  cursor:none;
}

/* CURSOR */
.cursor{
  position:fixed;width:8px;height:8px;
  background:var(--accent);
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
}
.cursor-ring{
  position:fixed;width:32px;height:32px;
  border:1px solid rgba(74,240,255,0.4);
  border-radius:50%;
  pointer-events:none;
  z-index:9998;
  transform:translate(-50%,-50%);
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;
  height:64px;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 56px;
  background:rgba(5,8,16,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  z-index:100;
}

.nav-logo{font-weight:800;text-decoration:none;color:var(--text)}
.nav-logo span{color:var(--accent)}

.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{text-decoration:none;color:var(--muted)}
.nav-links a:hover{color:var(--text)}

/* SECTIONS */
section{padding:100px 56px}

/* =========================
   ONLY ONE REVEAL SYSTEM
========================= */

.reveal{
  opacity:0;
  transform:translateY(24px);
  transition:opacity .7s ease, transform .7s ease;
  will-change:opacity,transform;
}

.reveal.is-visible{
  opacity:1;
  transform:translateY(0);
}

/* FOOTER */
footer{
  padding:28px 56px;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  color:var(--muted);
}

/* MOBILE */
@media(max-width:900px){
  nav{padding:0 24px}
  section{padding:70px 24px}
  .nav-links{display:none}
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="#hero" class="nav-logo">Jayesh <span>Choudhari</span></a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#experience">Experience</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- WRAPPERS -->
<div id="hero-section-wrapper"></div>
<div id="about-section-wrapper"></div>
<div id="projects-section-wrapper"></div>
<div id="experience-section-wrapper"></div>
<div id="skills-section-wrapper"></div>
<div id="certifications-section-wrapper"></div>
<div id="contact-section-wrapper"></div>

<footer>
  <span>© 2025 Jayesh Choudhari</span>
  <span>Berlin, Germany</span>
</footer>

<script>
/* =========================
   LOAD SECTIONS SAFELY
========================= */
const sections = [
  {id:'hero-section-wrapper',file:'sections/hero.html'},
  {id:'about-section-wrapper',file:'sections/about.html'},
  {id:'projects-section-wrapper',file:'sections/projects.html'},
  {id:'experience-section-wrapper',file:'sections/experience.html'},
  {id:'skills-section-wrapper',file:'sections/skills.html'},
  {id:'certifications-section-wrapper',file:'sections/certifications.html'},
  {id:'contact-section-wrapper',file:'sections/contact.html'},
];

function loadSections(){
  return Promise.all(
    sections.map(s =>
      fetch(s.file)
        .then(r=>r.text())
        .then(html=>{
          document.getElementById(s.id).innerHTML = html;
        })
    )
  );
}

/* =========================
   REVEAL SYSTEM (FIXED)
========================= */
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('is-visible');
      observer.unobserve(e.target);
    }
  });
},{threshold:0.15});

function initRevealSystem(){
  document.querySelectorAll('.reveal').forEach(el=>{
    observer.observe(el);
  });
}

/* =========================
   CURSOR
========================= */
function initCursor(){
  const c=document.getElementById('cursor');
  const r=document.getElementById('cursorRing');
  let mx=0,my=0,rx=0,ry=0;

  document.addEventListener('mousemove',e=>{
    mx=e.clientX;my=e.clientY;
    c.style.left=mx+'px';
    c.style.top=my+'px';
  });

  (function animate(){
    rx+=(mx-rx)*0.12;
    ry+=(my-ry)*0.12;
    r.style.left=rx+'px';
    r.style.top=ry+'px';
    requestAnimationFrame(animate);
  })();
}

/* =========================
   INIT EVERYTHING (SAFE ORDER)
========================= */
loadSections().then(()=>{
  initCursor();

  // wait DOM paint after fetch injection
  setTimeout(()=>{
    initRevealSystem();
  },150);
});
</script>

</body>
</html>
